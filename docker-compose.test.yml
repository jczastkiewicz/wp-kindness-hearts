services:

  # ── MySQL database ────────────────────────────────────────────────────────
  db_test:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      wordpress
      MYSQL_USER:          wordpress
      MYSQL_PASSWORD:      wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - test_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wordpress", "-pwordpress"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── WordPress ─────────────────────────────────────────────────────────────
  # Clean install — plugin NOT pre-mounted. Install via WP Admin manually.
  wordpress_test:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      db_test:
        condition: service_healthy
    ports:
      - "8082:80"
    environment:
      WORDPRESS_DB_HOST:     db_test:3306
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME:     wordpress
      WORDPRESS_DEBUG:       "1"
    volumes:
      # Isolated WP install (no plugin mount)
      - test_wp_html:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ -o /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ── WP-CLI: installs & configures WordPress (no plugin activation) ─────────
  wpcli_test:
    image: wordpress:cli
    restart: "no"
    depends_on:
      wordpress_test:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST:     db_test:3306
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME:     wordpress
    volumes:
      - test_wp_html:/var/www/html
      - ./docker/setup-test.sh:/setup.sh:ro
    entrypoint: ["sh", "/setup.sh"]

  # ── phpMyAdmin (optional DB browser) ─────────────────────────────────────
  phpmyadmin_test:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - db_test
    ports:
      - "8083:80"
    environment:
      PMA_HOST:     db_test
      PMA_USER:     wordpress
      PMA_PASSWORD: wordpress

volumes:
  test_db_data:
  test_wp_html:
