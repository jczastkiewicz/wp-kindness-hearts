services:

  # ── MySQL database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      wordpress
      MYSQL_USER:          wordpress
      MYSQL_PASSWORD:      wordpress
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wordpress", "-pwordpress"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── WordPress ─────────────────────────────────────────────────────────────
  wordpress:
    image: wordpress:6.5-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME:     wordpress
      WORDPRESS_DEBUG:       "1"
    volumes:
      # Share the full WP install with wpcli
      - wp_html:/var/www/html
      # Mount the plugin directory on top (live edits reflected immediately)
      - ./:/var/www/html/wp-content/plugins/wp-kindness-hearts
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ -o /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ── WP-CLI: auto-installs + configures WordPress on first run ─────────────
  wpcli:
    image: wordpress:cli
    restart: "no"
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_USER:     wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME:     wordpress
    volumes:
      # Same WP root as wordpress container
      - wp_html:/var/www/html
      # Same plugin mount
      - ./:/var/www/html/wp-content/plugins/wp-kindness-hearts
      # Setup script
      - ./docker/setup.sh:/setup.sh:ro
    entrypoint: ["sh", "/setup.sh"]

  # ── phpMyAdmin (optional DB browser) ─────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.3.0
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST:     db
      PMA_USER:     wordpress
      PMA_PASSWORD: wordpress

volumes:
  db_data:
  wp_html:
