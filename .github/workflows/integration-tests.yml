name: Integration tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. Build the React app ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build React app
        working-directory: app
        run: npm run build

      # ── 3. Build plugin zip ───────────────────────────────────────────────────
      - name: Build plugin zip
        run: |
          cd ..
          zip -r wp-kindness-hearts/wp-kindness-hearts.zip wp-kindness-hearts \
            --include \
              "wp-kindness-hearts/wp-kindness-hearts.php" \
              "wp-kindness-hearts/includes/*.php" \
              "wp-kindness-hearts/app/dist/*" \
              "wp-kindness-hearts/app/dist/**/*" \
              "wp-kindness-hearts/app/dist/.vite/*" \
              "wp-kindness-hearts/app/public/heart-192.png" \
              "wp-kindness-hearts/app/public/heart-512.png" \
              "wp-kindness-hearts/app/public/manifest.json" \
            -x "*.DS_Store" -x "*__MACOSX*"
          echo "Zip size: $(du -sh wp-kindness-hearts/wp-kindness-hearts.zip)"

      # ── 4. Start clean WordPress ──────────────────────────────────────────────
      - name: Start test WordPress (Docker Compose)
        run: |
          docker compose -f docker-compose.test.yml up -d \
            --scale phpmyadmin_test=0
          echo "Containers started."

      - name: Wait for WP-CLI setup to complete
        run: |
          echo "Waiting for wpcli_test to finish setup..."
          TIMEOUT=180
          ELAPSED=0
          WPCLI_ID=$(docker compose -f docker-compose.test.yml ps -q wpcli_test)
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(docker inspect --format '{{.State.Status}}' "$WPCLI_ID" 2>/dev/null || echo "running")
            if [ "$STATUS" = "exited" ]; then
              echo "WP-CLI setup done."
              break
            fi
            sleep 3
            ELAPSED=$((ELAPSED + 3))
            printf "."
          done
          echo ""
          echo "── WP-CLI logs ──────────────────────────────────"
          docker compose -f docker-compose.test.yml logs wpcli_test
          echo "─────────────────────────────────────────────────"

          # Fail if WordPress is not responding
          if ! curl -sf http://localhost:8082/ -o /dev/null; then
            echo "ERROR: WordPress not responding on port 8082."
            docker compose -f docker-compose.test.yml logs wordpress_test
            exit 1
          fi
          echo "WordPress is up at http://localhost:8082"

      # ── 5. Install Playwright ─────────────────────────────────────────────────
      - name: Install Playwright dependencies
        working-directory: tests
        run: |
          npm ci
          npx playwright install chromium --with-deps

      # ── 6. Run integration tests ──────────────────────────────────────────────
      - name: Run Playwright integration tests
        working-directory: tests
        run: npx playwright test

      # ── 7. Upload results (always, so failures are inspectable) ──────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

      - name: Upload test failure screenshots & videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: tests/test-results/
          retention-days: 7

      # ── 8. Write job summary ─────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        working-directory: tests
        run: |
          echo "## 🧪 Playwright Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f playwright-report/index.html ]; then
            PASSED=$(grep -o '"passed":[0-9]*' playwright-report/index.html 2>/dev/null | head -1 | grep -o '[0-9]*' || echo "?")
            FAILED=$(grep -o '"failed":[0-9]*' playwright-report/index.html 2>/dev/null | head -1 | grep -o '[0-9]*' || echo "?")
            SKIPPED=$(grep -o '"skipped":[0-9]*' playwright-report/index.html 2>/dev/null | head -1 | grep -o '[0-9]*' || echo "?")
            echo "| ✅ Passed | ❌ Failed | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|-----------|------------|" >> $GITHUB_STEP_SUMMARY
            echo "| $PASSED | $FAILED | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No report generated — tests may have failed to start." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 Full report available in the **playwright-report** artifact above." >> $GITHUB_STEP_SUMMARY

      # ── 9. Tear down Docker ───────────────────────────────────────────────────
      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
