name: Regenerate package-lock

on:
  workflow_dispatch:

jobs:
  regen-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps and regenerate lock
        working-directory: app
        run: |
          npm ci

      - name: Commit and push package-lock.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/package-lock.json
          git commit -m "chore(ci): regenerate app/package-lock.json on ubuntu-latest (Node 20)" || echo "No changes to commit"
          git push origin HEAD:fix/low-polish-l10-l18
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
