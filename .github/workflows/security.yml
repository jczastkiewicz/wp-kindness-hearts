name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 03:00 UTC to catch new CVEs
    - cron: "0 3 * * 1"

jobs:
  # ── CodeQL: deep static security analysis (JS + PHP) ─────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # PHP is covered by PHPStan in the code-quality workflow.
        # CodeQL PHP requires additional build setup and is omitted here.
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── npm audit: known CVEs in JS dependencies ─────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit app production dependencies
        working-directory: app
        # --omit=dev: vite/vitest/workbox are build tools only — not bundled into the plugin
        run: npm audit --omit=dev --audit-level=high

      - name: Audit test dependencies
        working-directory: tests
        run: npm audit --audit-level=high

  # ── Trivy: filesystem scan (secrets, misconfigs, CVEs) ───────────────────────
  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"           # Don't fail the build — report only

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
