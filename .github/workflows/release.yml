name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check all CI workflows are green on tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;

            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              per_page: 100,
            });

            // Exclude this workflow's own jobs from the check
            const checks = data.check_runs.filter(c =>
              !c.name.includes('verify-ci') &&
              !c.name.includes('create-release')
            );

            if (checks.length === 0) {
              core.setFailed('No CI checks found for this commit. Make sure CI ran before tagging.');
              return;
            }

            const pending = checks.filter(c => c.status !== 'completed');
            if (pending.length > 0) {
              core.setFailed(`CI still running: ${pending.map(c => c.name).join(', ')}`);
              return;
            }

            const failed = checks.filter(c =>
              c.conclusion !== 'success' &&
              c.conclusion !== 'skipped' &&
              c.conclusion !== 'neutral'
            );
            if (failed.length > 0) {
              core.setFailed(`CI checks failed: ${failed.map(c => `${c.name} (${c.conclusion})`).join(', ')}`);
              return;
            }

            console.log(`✅ All ${checks.length} CI checks passed on ${sha.slice(0, 7)}`);

  create-release:
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Build plugin
        run: bash build-plugin.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: wp-kindness-hearts.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
